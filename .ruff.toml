target-version = "py313"
line-length = 100

[format]
# Like Black, use double quotes for strings.
quote-style = "double"
# Like Black, indent with spaces, rather than tabs.
indent-style = "space"
# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false
# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

[lint]
select = [
  "A",    # flake8-builtins
  "B",    # flake8-bugbear
  "C4",   # flake8-comprehensions
  "C90",  # maccabe
  "COM",  # flake8-commas
  "D",    # pydocstyle
  "DTZ",  # flake8-datetimez
  "E",    # pycodestyle
  "ERA",  # flake8-eradicate
  "EXE",  # flake8-executable
  "F",    # pyflakes
  "FBT",  # flake8-boolean-trap
  "FLY",  # pyflint
  "FURB", # refurb
  "G",    # flake8-logging-format
  "I",    # isort
  "ICN",  # flake8-import-conventions
  "ISC",  # flake8-implicit-str-concat
  "LOG",  # flake8-logging
  "N",    # pep8-naming
  "PERF", # perflint
  "PIE",  # flake8-pie
  "PL",   # pylint
  "PT",   # flake8-pytest-style
  "PTH",  # flake8-use-pathlib
  "RET",  # flake8-return
  "RSE",  # flake8-raise
  "RUF",  # ruff
  "S",    # flake8-bandit
  "SIM",  # flake8-simpify
  "SLF",  # flake8-self
  "SLOT", # flake8-slots
  "T100", # flake8-debugger
  "TRY",  # tryceratops
  "UP",   # pyupgrade
  "W",    # pycodestyle
  "YTT",  # flake8-2020
]
ignore = [
  "COM812", # trailing comma, conflicts with `ruff format`
  # Different doc rules that we don't really care about:
  "D100",
  "D104",
  "D106",
  "D107",    # __init__ methods don't need docstrings
  "D203",
  "D212",
  "D401",
  "D404",
  "D405",
  "ISC001",  # implicit string concat conflicts with `ruff format`
  "ISC003",  # prefer explicit string concat over implicit concat
  "PLR09",   # we have our own complexity rules
  "PLR2004", # do not report magic numbers
  "TRY003",  # long exception messages from `tryceratops`
]

extend-safe-fixes = [
  # non-pep585-annotation
  "UP006",
]

[lint.per-file-ignores]
"**/tests/**/*.py" = [
  "D103",    # Relax docstring requirements
  "FBT001",  # False positive for boolean trap
  "PLC0415", # imports inside functions are intentional for lazy loading in tests
  "S101",    # asserts
  "S105",    # hardcoded passwords
  "S108",    # temp file usage is fine in tests
  "S110",    # try-except-pass is fine when we only care about side effects
  "S404",    # subprocess calls are for tests
  "S603",    # do not require `shell=True`
  "S607",    # partial executable paths
  "SIM105",  # contextlib.suppress not always clearer in tests
  "SLF001",  # Private method access needed for tests
]
# IPython startup: imports are loaded into the REPL, not consumed in-file.
# IPython config: get_config() and c are IPython-injected globals.
"config/ipython/profile_default/**/*.py" = ["D", "ERA", "F401", "F821", "ICN", "PTH"]

[lint.flake8-import-conventions]
banned-from = [
  "datetime",
  "decimal",
  "itertools",
  "numpy",
  "polars",
]
aliases = { datetime = "dt", decimal = "dec", itertools = "it", numpy = "np", polars = "pl" }

[lint.mccabe]
max-complexity = 15

[lint.isort]
section-order = [
  "future",
  "standard-library",
  "third-party",
  "first-party",
  "local-folder",
]

required-imports = ["from __future__ import annotations"]

[lint.pydocstyle]
convention = "google"
